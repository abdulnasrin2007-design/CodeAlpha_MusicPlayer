<!DOCTYPE html>
<html>

<head>

<title>Music Player</title>

<link rel="stylesheet" href="style.css">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>


<body>


<div class="app">


<!-- PLAYLIST SCREEN -->

<div class="playlist-page" id="playlistPage">


<h1>🎵 My Playlist</h1>

<p>Select a song to play</p>


<div id="playlist"></div>


</div>



<!-- PLAYER SCREEN -->

<div class="player-page" id="playerPage">


<button class="close" onclick="closePlayer()">✕</button>


<img id="cover">


<h1 id="title"></h1>

<p id="artist"></p>


<audio id="audio"></audio>


<div class="time">

<span id="current">0:00</span>

<input
type="range"
id="progress"
value="0">

<span id="duration">0:00</span>

</div>



<div class="controls">

<button onclick="prev()">⏮</button>

<button onclick="playPause()" id="play">
▶
</button>

<button onclick="next()">⏭</button>

</div>


<input
type="range"
id="volume"
min="0"
max="1"
step="0.1"
value="1">


</div>



<!-- FOOTER -->

<footer class="credit">
© 2026 Abdul Nasrin • Music Player
</footer>


</div>


<script src="script.js"></script>


</body>

</html>
